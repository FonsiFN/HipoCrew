<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>La Crew de Hipobuy · Catálogo</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />
  <style>
    /* ---- RESET & BASE ---- */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: #0d0d0d;
      color: #f0f0f0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      overflow-x: hidden;
    }

    /* ---- SPLASH SCREEN ---- */
    #splash {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      background: #0b0b0b;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      z-index: 9999;
      transition: opacity 0.8s ease, visibility 0.8s ease;
      opacity: 1;
      visibility: visible;
    }

    #splash.hidden {
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
    }

    #splash-canvas {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 0;
    }

    .splash-content {
      position: relative;
      z-index: 1;
      text-align: center;
      padding: 20px;
    }

    .splash-logo {
      font-size: 4.5rem;
      color: #facc15;
      background: rgba(26, 26, 26, 0.8);
      backdrop-filter: blur(8px);
      padding: 20px 30px;
      border-radius: 30px;
      display: inline-block;
      margin-bottom: 20px;
      box-shadow: 0 0 60px rgba(250, 204, 21, 0.2);
      animation: glowPulse 2s infinite alternate;
    }

    @keyframes glowPulse {
      0% { box-shadow: 0 0 30px rgba(250, 204, 21, 0.1); }
      100% { box-shadow: 0 0 80px rgba(250, 204, 21, 0.4); }
    }

    .splash-title {
      font-size: 2.8rem;
      font-weight: 900;
      background: linear-gradient(135deg, #facc15, #f59e0b);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      letter-spacing: -1px;
    }

    .splash-sub {
      color: #888;
      font-size: 1.1rem;
      margin-top: 8px;
      letter-spacing: 2px;
    }

    .splash-bar {
      width: 280px;
      max-width: 80%;
      height: 4px;
      background: #1f1f1f;
      border-radius: 4px;
      margin: 30px auto 0;
      overflow: hidden;
    }

    .splash-bar-inner {
      width: 0%;
      height: 100%;
      background: linear-gradient(90deg, #facc15, #f59e0b);
      border-radius: 4px;
      transition: width 0.15s linear;
    }

    .splash-text {
      color: #555;
      font-size: 0.8rem;
      margin-top: 12px;
      letter-spacing: 1px;
    }

    /* ---- CONTENIDO PRINCIPAL (oculto inicialmente) ---- */
    #main-content {
      opacity: 0;
      transform: translateY(30px);
      transition: opacity 0.9s ease, transform 0.9s ease;
      width: 100%;
      max-width: 1440px;
      padding: 0 20px 40px;
    }

    #main-content.visible {
      opacity: 1;
      transform: translateY(0);
    }

    /* ---- HEADER ---- */
    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      padding: 30px 0 20px;
      border-bottom: 1px solid #2a2a2a;
      margin-bottom: 30px;
      position: sticky;
      top: 0;
      background: rgba(13, 13, 13, 0.8);
      backdrop-filter: blur(12px);
      z-index: 100;
      transition: background 0.3s;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .logo-icon {
      font-size: 2.2rem;
      color: #facc15;
      background: #1f1f1f;
      padding: 10px;
      border-radius: 16px;
      box-shadow: 0 0 20px rgba(250, 204, 21, 0.15);
    }

    .logo h1 {
      font-size: 1.8rem;
      font-weight: 800;
      letter-spacing: -0.5px;
      background: linear-gradient(135deg, #facc15, #f59e0b);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .logo span {
      font-weight: 400;
      font-size: 0.9rem;
      color: #888;
      -webkit-text-fill-color: #888;
      background: none;
      display: block;
      letter-spacing: 1px;
    }

    .stats {
      background: #1a1a1a;
      padding: 8px 20px;
      border-radius: 40px;
      font-size: 0.9rem;
      border: 1px solid #2e2e2e;
      color: #aaa;
    }

    .stats i {
      color: #facc15;
      margin-right: 8px;
    }

    /* ---- BÚSQUEDA Y FILTROS ---- */
    .search-section {
      display: flex;
      flex-wrap: wrap;
      gap: 16px;
      margin-bottom: 30px;
      background: #151515;
      padding: 20px 24px;
      border-radius: 20px;
      border: 1px solid #262626;
    }

    .search-box {
      flex: 1 1 280px;
      display: flex;
      align-items: center;
      background: #1e1e1e;
      border-radius: 40px;
      padding: 0 18px;
      border: 1px solid #333;
      transition: border 0.2s;
    }

    .search-box:focus-within {
      border-color: #facc15;
      box-shadow: 0 0 0 3px rgba(250, 204, 21, 0.15);
    }

    .search-box i {
      color: #777;
      font-size: 1rem;
    }

    .search-box input {
      background: transparent;
      border: none;
      padding: 14px 12px;
      font-size: 1rem;
      color: #eee;
      width: 100%;
      outline: none;
      font-family: 'Inter', sans-serif;
    }

    .search-box input::placeholder {
      color: #555;
    }

    .filters {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      align-items: center;
    }

    .filter-btn {
      background: #1e1e1e;
      border: 1px solid #333;
      color: #ccc;
      padding: 8px 18px;
      border-radius: 30px;
      font-size: 0.8rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      font-family: 'Inter', sans-serif;
      letter-spacing: 0.3px;
    }

    .filter-btn:hover {
      background: #2a2a2a;
      border-color: #555;
    }

    .filter-btn.active {
      background: #facc15;
      border-color: #facc15;
      color: #0d0d0d;
    }

    .clear-btn {
      background: transparent;
      border: 1px solid #444;
      color: #888;
      padding: 8px 16px;
      border-radius: 30px;
      font-size: 0.8rem;
      cursor: pointer;
      transition: 0.2s;
    }

    .clear-btn:hover {
      background: #2a2a2a;
      color: #eee;
    }

    /* ---- GRID DE PRODUCTOS ---- */
    .product-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
      gap: 24px;
      margin-top: 10px;
    }

    .product-card {
      background: #151515;
      border-radius: 20px;
      border: 1px solid #252525;
      overflow: hidden;
      transition: transform 0.3s ease, box-shadow 0.3s ease, border-color 0.3s;
      display: flex;
      flex-direction: column;
      opacity: 0;
      transform: translateY(40px);
      animation: cardAppear 0.5s forwards;
    }

    .product-card:nth-child(1)  { animation-delay: 0.05s; }
    .product-card:nth-child(2)  { animation-delay: 0.10s; }
    .product-card:nth-child(3)  { animation-delay: 0.15s; }
    .product-card:nth-child(4)  { animation-delay: 0.20s; }
    .product-card:nth-child(5)  { animation-delay: 0.25s; }
    .product-card:nth-child(6)  { animation-delay: 0.30s; }
    .product-card:nth-child(7)  { animation-delay: 0.35s; }
    .product-card:nth-child(8)  { animation-delay: 0.40s; }
    .product-card:nth-child(9)  { animation-delay: 0.45s; }
    .product-card:nth-child(10) { animation-delay: 0.50s; }
    .product-card:nth-child(11) { animation-delay: 0.55s; }
    .product-card:nth-child(12) { animation-delay: 0.60s; }
    .product-card:nth-child(13) { animation-delay: 0.65s; }
    .product-card:nth-child(14) { animation-delay: 0.70s; }
    .product-card:nth-child(15) { animation-delay: 0.75s; }
    .product-card:nth-child(16) { animation-delay: 0.80s; }
    .product-card:nth-child(17) { animation-delay: 0.85s; }
    .product-card:nth-child(18) { animation-delay: 0.90s; }
    .product-card:nth-child(19) { animation-delay: 0.95s; }
    .product-card:nth-child(20) { animation-delay: 1.00s; }

    @keyframes cardAppear {
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .product-card:hover {
      transform: translateY(-8px);
      box-shadow: 0 20px 50px rgba(0, 0, 0, 0.7);
      border-color: #facc15;
    }

    .product-image {
      height: 180px;
      background: #1c1c1c;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 3rem;
      color: #444;
      border-bottom: 1px solid #222;
      position: relative;
      transition: background 0.3s;
    }

    .product-card:hover .product-image {
      background: #222;
    }

    .product-image .brand-tag {
      position: absolute;
      top: 12px;
      left: 12px;
      background: rgba(0, 0, 0, 0.75);
      backdrop-filter: blur(4px);
      padding: 4px 12px;
      border-radius: 20px;
      font-size: 0.65rem;
      font-weight: 700;
      letter-spacing: 0.5px;
      color: #facc15;
      border: 1px solid #facc1533;
    }

    .product-info {
      padding: 16px 18px 18px;
      flex: 1;
      display: flex;
      flex-direction: column;
    }

    .product-brand {
      font-size: 0.75rem;
      font-weight: 700;
      color: #facc15;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 4px;
    }

    .product-category {
      font-size: 0.7rem;
      color: #888;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 8px;
    }

    .product-model {
      font-weight: 600;
      font-size: 0.95rem;
      line-height: 1.4;
      margin-bottom: 8px;
      color: #eee;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .product-batch {
      font-size: 0.75rem;
      color: #aaa;
      background: #1f1f1f;
      padding: 4px 12px;
      border-radius: 20px;
      display: inline-block;
      align-self: flex-start;
      margin-top: 6px;
      border: 1px solid #2a2a2a;
    }

    .product-link {
      margin-top: 14px;
      background: #1f1f1f;
      border-radius: 40px;
      padding: 8px 14px;
      text-align: center;
      font-size: 0.75rem;
      font-weight: 600;
      color: #aaa;
      transition: 0.2s;
      border: 1px solid #2a2a2a;
      text-decoration: none;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    .product-link i {
      color: #facc15;
    }

    .product-link:hover {
      background: #2a2a2a;
      color: #fff;
      border-color: #facc15;
    }

    .no-results {
      grid-column: 1 / -1;
      text-align: center;
      padding: 60px 20px;
      color: #666;
      font-size: 1.2rem;
    }

    .no-results i {
      font-size: 3rem;
      display: block;
      margin-bottom: 16px;
      color: #333;
    }

    /* ---- FOOTER ---- */
    .footer {
      margin-top: 50px;
      padding: 30px 0 10px;
      border-top: 1px solid #1f1f1f;
      text-align: center;
      color: #444;
      font-size: 0.8rem;
      width: 100%;
    }

    .footer i {
      color: #facc15;
    }

    /* ---- SCROLLBAR ---- */
    ::-webkit-scrollbar { width: 8px; }
    ::-webkit-scrollbar-track { background: #0d0d0d; }
    ::-webkit-scrollbar-thumb { background: #2a2a2a; border-radius: 10px; }
    ::-webkit-scrollbar-thumb:hover { background: #3a3a3a; }

    /* ---- RESPONSIVE ---- */
    @media (max-width: 640px) {
      .header { flex-direction: column; align-items: flex-start; gap: 12px; }
      .logo h1 { font-size: 1.4rem; }
      .search-section { padding: 16px; }
      .product-grid { grid-template-columns: 1fr 1fr; gap: 16px; }
      .splash-title { font-size: 2rem; }
    }
    @media (max-width: 420px) {
      .product-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

  <script>
    // --------------------------------------------------------------
    // 0. SPLASH SCREEN - PARTÍCULAS Y PROGRESO
    // --------------------------------------------------------------
    (function splash() {
      const canvas = document.getElementById('splash-canvas');
      const ctx = canvas.getContext('2d');
      let width, height, particles = [];
      const NUM_PARTICLES = 120;

      function resize() {
        width = canvas.width = window.innerWidth;
        height = canvas.height = window.innerHeight;
      }
      window.addEventListener('resize', resize);
      resize();

      class Particle {
        constructor() {
          this.reset();
        }
        reset() {
          this.x = Math.random() * width;
          this.y = Math.random() * height;
          this.size = Math.random() * 2.5 + 0.5;
          this.speedX = (Math.random() - 0.5) * 0.8;
          this.speedY = (Math.random() - 0.5) * 0.8;
          this.opacity = Math.random() * 0.6 + 0.2;
        }
        update() {
          this.x += this.speedX;
          this.y += this.speedY;
          if (this.x < 0 || this.x > width) this.speedX *= -1;
          if (this.y < 0 || this.y > height) this.speedY *= -1;
        }
        draw() {
          ctx.beginPath();
          ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
          ctx.fillStyle = `rgba(250, 204, 21, ${this.opacity})`;
          ctx.fill();
        }
      }

      for (let i = 0; i < NUM_PARTICLES; i++) particles.push(new Particle());

      function animateParticles() {
        ctx.clearRect(0, 0, width, height);
        particles.forEach(p => { p.update(); p.draw(); });
        // Dibujar conexiones (opcional)
        for (let i = 0; i < particles.length; i++) {
          for (let j = i + 1; j < particles.length; j++) {
            const dx = particles[i].x - particles[j].x;
            const dy = particles[i].y - particles[j].y;
            const dist = Math.sqrt(dx * dx + dy * dy);
            if (dist < 120) {
              ctx.beginPath();
              ctx.moveTo(particles[i].x, particles[i].y);
              ctx.lineTo(particles[j].x, particles[j].y);
              ctx.strokeStyle = `rgba(250, 204, 21, ${0.08 * (1 - dist/120)})`;
              ctx.lineWidth = 0.6;
              ctx.stroke();
            }
          }
        }
        requestAnimationFrame(animateParticles);
      }
      animateParticles();

      // Barra de progreso
      const progressBar = document.getElementById('progressBar');
      const splashText = document.getElementById('splashText');
      let progress = 0;
      const interval = setInterval(() => {
        progress += Math.random() * 4 + 2;
        if (progress >= 100) {
          progress = 100;
          clearInterval(interval);
          splashText.textContent = '¡Listo!';
          setTimeout(() => {
            document.getElementById('splash').classList.add('hidden');
            document.getElementById('main-content').classList.add('visible');
          }, 400);
        }
        progressBar.style.width = progress + '%';
        if (progress < 30) splashText.textContent = 'Preparando el catálogo...';
        else if (progress < 70) splashText.textContent = 'Cargando productos...';
        else if (progress < 95) splashText.textContent = 'Casi listo...';
      }, 80);
    })();

    const filterBtns = document.querySelectorAll('.filter-btn');

      'Zapatos/Zapatillas': '👟',
      'Accesorios/Hoodies': '🧥',
      'Relojes': '⌚'
    };

    function render() {
      const query = searchInput.value.toLowerCase().trim();
      let filtered = products;

      if (currentFilter !== 'all') {
        filtered = filtered.filter(p => p.marca === currentFilter);
      }

      if (query) {
        filtered = filtered.filter(p =>
          p.marca.toLowerCase().includes(query) ||
          p.categoria.toLowerCase().includes(query) ||
          p.modelo.toLowerCase().includes(query) ||
          p.batch.toLowerCase().includes(query)
        );
      }

      filteredProducts = filtered;
      statsSpan.textContent = filteredProducts.length;

      if (filteredProducts.length === 0) {
        grid.innerHTML = `
          <div class="no-results">
            <i class="fas fa-search"></i>
            No encontramos productos que coincidan con tu búsqueda.<br />

        return;

        const icon = categoryIcon[p.categoria] || '📦';
        // Añadimos un retraso en línea para la animación escalonada (solo si no se han renderizado antes)
        const delay = Math.min(index * 0.04, 1.2);
        html += `
          <div class="product-card" style="animation-delay: ${delay}s;">
            <div class="product-image">
              <span style="font-size: 3.5rem; opacity: 0.8;">${icon}</span>
              <span class="brand-tag">${p.marca}</span>
            </div>

              <div class="product-category">${p.categoria}</div>
              <div class="product-model">${p.modelo}</div>
              <div class="product-batch">${p.batch}</div>

              </a>
            </div>
          </div>
        `;
      });

      grid.innerHTML = html;
    }

    searchInput.addEventListener('input', render);

    filterBtns.forEach(btn => {
      btn.addEventListener('click', () => {
        filterBtns.forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        currentFilter = btn.dataset.filter;
        render();

    });

      document.querySelector('.filter-btn[data-filter="all"]').classList.add('active');
