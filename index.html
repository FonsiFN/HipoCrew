<!DOCTYPE html>
<html lang="es">
<head>

  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <!-- Google Fonts para un estilo urbano -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: #0d0d0d;
      color: #f0f0f0;
      padding: 0 20px 40px;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    /* Contenedor principal */
    .app {
      max-width: 1440px;
      width: 100%;
    }

    /* Header */
    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      padding: 30px 0 20px;
      border-bottom: 1px solid #2a2a2a;
      margin-bottom: 30px;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .logo-icon {
      font-size: 2.2rem;
      color: #facc15;
      background: #1f1f1f;
      padding: 10px;
      border-radius: 16px;
      box-shadow: 0 0 20px rgba(250, 204, 21, 0.15);
    }

    .logo h1 {
      font-size: 1.8rem;
      font-weight: 800;
      letter-spacing: -0.5px;
      background: linear-gradient(135deg, #facc15, #f59e0b);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .logo span {
      font-weight: 400;
      font-size: 0.9rem;
      color: #888;
      -webkit-text-fill-color: #888;
      background: none;
      display: block;
      letter-spacing: 1px;
    }

    .stats {
      background: #1a1a1a;
      padding: 8px 20px;
      border-radius: 40px;
      font-size: 0.9rem;
      border: 1px solid #2e2e2e;
      color: #aaa;
    }

    .stats i {
      color: #facc15;
      margin-right: 8px;
    }

    /* Barra de búsqueda */
    .search-section {
      display: flex;
      flex-wrap: wrap;
      gap: 16px;
      margin-bottom: 30px;
      background: #151515;
      padding: 20px 24px;
      border-radius: 20px;
      border: 1px solid #262626;
    }

    .search-box {
      flex: 1 1 280px;
      display: flex;
      align-items: center;
      background: #1e1e1e;
      border-radius: 40px;
      padding: 0 18px;
      border: 1px solid #333;
      transition: border 0.2s;
    }

    .search-box:focus-within {
      border-color: #facc15;
      box-shadow: 0 0 0 3px rgba(250, 204, 21, 0.15);
    }

    .search-box i {
      color: #777;
      font-size: 1rem;
    }

    .search-box input {
      background: transparent;
      border: none;
      padding: 14px 12px;
      font-size: 1rem;
      color: #eee;
      width: 100%;
      outline: none;
      font-family: 'Inter', sans-serif;
    }

    .search-box input::placeholder {
      color: #555;
    }

    .filters {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      align-items: center;
    }

    .filter-btn {
      background: #1e1e1e;
      border: 1px solid #333;
      color: #ccc;
      padding: 8px 18px;
      border-radius: 30px;
      font-size: 0.8rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      font-family: 'Inter', sans-serif;
      letter-spacing: 0.3px;
    }

    .filter-btn:hover {
      background: #2a2a2a;
      border-color: #555;
    }

    .filter-btn.active {
      background: #facc15;
      border-color: #facc15;
      color: #0d0d0d;
    }

    .clear-btn {
      background: transparent;
      border: 1px solid #444;
      color: #888;
      padding: 8px 16px;
      border-radius: 30px;
      font-size: 0.8rem;
      cursor: pointer;
      transition: 0.2s;
    }

    .clear-btn:hover {
      background: #2a2a2a;
      color: #eee;
    }

    /* Grid de productos */
    .product-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
      gap: 24px;
      margin-top: 10px;
    }

    .product-card {
      background: #151515;
      border-radius: 20px;
      border: 1px solid #252525;
      overflow: hidden;
      transition: transform 0.2s, box-shadow 0.2s;
      display: flex;
      flex-direction: column;
    }

    .product-card:hover {
      transform: translateY(-6px);
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.6);
      border-color: #3a3a3a;
    }

    .product-image {
      height: 180px;
      background: #1c1c1c;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 3rem;
      color: #444;
      border-bottom: 1px solid #222;
      position: relative;
    }

    .product-image .brand-tag {
      position: absolute;
      top: 12px;
      left: 12px;
      background: rgba(0, 0, 0, 0.75);
      backdrop-filter: blur(4px);
      padding: 4px 12px;
      border-radius: 20px;
      font-size: 0.65rem;
      font-weight: 700;
      letter-spacing: 0.5px;
      color: #facc15;
      border: 1px solid #facc1533;
    }

    .product-info {
      padding: 16px 18px 18px;
      flex: 1;
      display: flex;
      flex-direction: column;
    }

    .product-brand {
      font-size: 0.75rem;
      font-weight: 700;
      color: #facc15;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 4px;
    }

    .product-category {
      font-size: 0.7rem;
      color: #888;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 8px;
    }

    .product-model {
      font-weight: 600;
      font-size: 0.95rem;
      line-height: 1.4;
      margin-bottom: 8px;
      color: #eee;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .product-batch {
      font-size: 0.75rem;
      color: #aaa;
      background: #1f1f1f;
      padding: 4px 12px;
      border-radius: 20px;
      display: inline-block;
      align-self: flex-start;
      margin-top: 6px;
      border: 1px solid #2a2a2a;
    }

    .product-link {
      margin-top: 14px;
      background: #1f1f1f;
      border-radius: 40px;
      padding: 8px 14px;
      text-align: center;
      font-size: 0.75rem;
      font-weight: 600;
      color: #aaa;
      transition: 0.2s;
      border: 1px solid #2a2a2a;
      text-decoration: none;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    .product-link i {
      color: #facc15;
    }

    .product-link:hover {
      background: #2a2a2a;
      color: #fff;
      border-color: #facc15;
    }

    .no-results {
      grid-column: 1 / -1;
      text-align: center;
      padding: 60px 20px;
      color: #666;
      font-size: 1.2rem;
    }

    .no-results i {
      font-size: 3rem;
      display: block;
      margin-bottom: 16px;
      color: #333;
    }

    /* Footer */
    .footer {
      margin-top: 50px;
      padding: 30px 0 10px;
      border-top: 1px solid #1f1f1f;
      text-align: center;
      color: #444;
      font-size: 0.8rem;
      width: 100%;
    }

    .footer i {
      color: #facc15;
    }

    /* Scroll personalizado */
    ::-webkit-scrollbar {
      width: 8px;
    }
    ::-webkit-scrollbar-track {
      background: #0d0d0d;
    }
    ::-webkit-scrollbar-thumb {
      background: #2a2a2a;
      border-radius: 10px;
    }
    ::-webkit-scrollbar-thumb:hover {
      background: #3a3a3a;
    }

    /* Responsive */
    @media (max-width: 640px) {
      .header {
        flex-direction: column;
        align-items: flex-start;
        gap: 12px;
      }
      .logo h1 {
        font-size: 1.4rem;
      }
      .search-section {
        padding: 16px;
      }
      .product-grid {
        grid-template-columns: 1fr 1fr;
        gap: 16px;
      }
    }

    @media (max-width: 420px) {
      .product-grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <!-- Header -->

  </div>

  <script>
    // --------------------------------------------------------------
    // 1. GENERACIÓN DE PRODUCTOS (basados en el archivo + expansión)

    function generateProducts() {
      const baseProducts = [];

      // Vendedores por marca (rotaremos)
      const sellers = {

      // Categorías y prefijos de modelo
      const categories = ['Camisetas', 'Pantalones', 'Zapatos/Zapatillas', 'Accesorios/Hoodies', 'Relojes'];

      const brands = Object.keys(sellers);

        { marca: 'CORTEIZ', categoria: 'Camisetas', modelo: 'CORTEIZ Vintage Oversized Summer Cotton Tee Fit-#3249', batch: 'Angelseller', enlace: 'https://weidian.com/item.html?itemID=61500249' },

        { marca: 'STUSSY', categoria: 'Camisetas', modelo: 'STUSSY Vintage Oversized Summer Cotton Tee Fit-#4744', batch: 'Subway Hooligan', enlace: 'https://item.taobao.com/item.htm?id=65101744' },

      // Añadir estos reales
      realProducts.forEach(p => baseProducts.push(p));

      // Ahora generar productos adicionales para cada marca y categoría

        { marca: 'CORTEIZ', cat: 'Camisetas', prefix: 'CORTEIZ Vintage Oversized Summer Cotton Tee Fit-#', idStart: 61500800, idEnd: 61500850 },
        { marca: 'CORTEIZ', cat: 'Pantalones', prefix: 'CORTEIZ Streetwear Baggy Cargo Denim Pants Style-#', idStart: 61500900, idEnd: 61500950 },
        { marca: 'CORTEIZ', cat: 'Zapatos/Zapatillas', prefix: 'CORTEIZ Sneaker Premium Luxury Vault Line Ref-#', idStart: 61501000, idEnd: 61501050 },
        { marca: 'CORTEIZ', cat: 'Accesorios/Hoodies', prefix: 'CORTEIZ Heavyweight Fleece Garment Essentials Ref-#', idStart: 61501100, idEnd: 61501150 },
        { marca: 'ESSENTIALS', cat: 'Camisetas', prefix: 'ESSENTIALS Vintage Oversized Summer Cotton Tee Fit-#', idStart: 67901200, idEnd: 67901250 },
        { marca: 'ESSENTIALS', cat: 'Pantalones', prefix: 'ESSENTIALS Streetwear Baggy Cargo Denim Pants Style-#', idStart: 67901300, idEnd: 67901350 },
        { marca: 'ESSENTIALS', cat: 'Accesorios/Hoodies', prefix: 'ESSENTIALS Heavyweight Fleece Garment Essentials Ref-#', idStart: 67901400, idEnd: 67901450 },

        { marca: 'LOUIS VUITTON', cat: 'Camisetas', prefix: 'LOUIS VUITTON Vintage Oversized Summer Cotton Tee Fit-#', idStart: 44201600, idEnd: 44201650 },

        { marca: 'LOUIS VUITTON', cat: 'Accesorios/Hoodies', prefix: 'LOUIS VUITTON Heavyweight Fleece Garment Essentials Ref-#', idStart: 44201900, idEnd: 44201950 },
        { marca: 'NIKE', cat: 'Zapatos/Zapatillas', prefix: 'NIKE Sneaker Premium Luxury Vault Line Ref-#', idStart: 49602000, idEnd: 49602050 },
        { marca: 'NIKE', cat: 'Accesorios/Hoodies', prefix: 'NIKE Heavyweight Fleece Garment Essentials Ref-#', idStart: 49602100, idEnd: 49602150 },
        { marca: 'ROLEX', cat: 'Relojes', prefix: 'ROLEX SuperClon 41mm Masterpiece Craft Ref-#', idStart: 43102200, idEnd: 43102250 },
        { marca: 'STUSSY', cat: 'Camisetas', prefix: 'STUSSY Vintage Oversized Summer Cotton Tee Fit-#', idStart: 65102300, idEnd: 65102350 },
        { marca: 'STUSSY', cat: 'Pantalones', prefix: 'STUSSY Streetwear Baggy Cargo Denim Pants Style-#', idStart: 65102400, idEnd: 65102450 },

      ];

      // Para cada combo, generar productos
      brandCategoryCombos.forEach(combo => {
        const sellerList = sellers[combo.marca] || ['Top Batch'];
        for (let id = combo.idStart; id <= combo.idEnd; id++) {
          const seller = sellerList[id % sellerList.length];
          baseProducts.push({
            marca: combo.marca,
            categoria: combo.cat,
            modelo: `${combo.prefix}${id}`,
            batch: seller,
            enlace: `https://item.taobao.com/item.htm?id=${id}` // o weidian según marca
          });
        }
      });

      // Ajustar algunos enlaces a Weidian para marcas que los usan (Corteiz, Jordan, LV, Nike, Rolex)
      // Pero lo dejamos genérico, ya tienen enlaces variados

      return baseProducts;
    }

    // --------------------------------------------------------------
    // 2. RENDERIZADO Y LÓGICA DE BÚSQUEDA
    // --------------------------------------------------------------
    const products = generateProducts();
    let filteredProducts = [...products];
    let currentFilter = 'all';

    const grid = document.getElementById('productGrid');
    const searchInput = document.getElementById('searchInput');
    const statsSpan = document.getElementById('productCount');
    const filterBtns = document.querySelectorAll('.filter-btn');
    const clearBtn = document.getElementById('clearFilters');

    // Iconos de ejemplo para categorías (placeholders)
    const categoryIcon = {
      'Camisetas': '👕',
      'Pantalones': '👖',
      'Zapatos/Zapatillas': '👟',
      'Accesorios/Hoodies': '🧥',
      'Relojes': '⌚'
    };

    function render() {
      const query = searchInput.value.toLowerCase().trim();
      let filtered = products;

      // Filtro por marca
      if (currentFilter !== 'all') {
        filtered = filtered.filter(p => p.marca === currentFilter);
      }

      // Búsqueda por texto
      if (query) {
        filtered = filtered.filter(p =>
          p.marca.toLowerCase().includes(query) ||
          p.categoria.toLowerCase().includes(query) ||
          p.modelo.toLowerCase().includes(query) ||
          p.batch.toLowerCase().includes(query)
        );
      }

      filteredProducts = filtered;
      statsSpan.textContent = filteredProducts.length;

      if (filteredProducts.length === 0) {
        grid.innerHTML = `
          <div class="no-results">
            <i class="fas fa-search"></i>
            No encontramos productos que coincidan con tu búsqueda.<br />
            <span style="font-size:0.9rem; color:#555;">Prueba con otra palabra o elimina el filtro</span>
          </div>
        `;
        return;
      }

      let html = '';
      filteredProducts.forEach(p => {
        const icon = categoryIcon[p.categoria] || '📦';
        // Para la imagen usamos un emoji grande con fondo
        html += `
          <div class="product-card">
            <div class="product-image" style="background: #1a1a1a;">
              <span style="font-size: 3.5rem; opacity: 0.8;">${icon}</span>
              <span class="brand-tag">${p.marca}</span>
            </div>
            <div class="product-info">
              <div class="product-brand">${p.marca}</div>
              <div class="product-category">${p.categoria}</div>
              <div class="product-model">${p.modelo}</div>
              <div class="product-batch">${p.batch}</div>
              <a href="${p.enlace}" target="_blank" rel="noopener noreferrer" class="product-link">
                <i class="fas fa-external-link-alt"></i> Ver en Tienda
              </a>
            </div>
          </div>
        `;
      });

      grid.innerHTML = html;
    }

    // Eventos de búsqueda
    searchInput.addEventListener('input', render);

    // Filtros de marca
    filterBtns.forEach(btn => {
      btn.addEventListener('click', () => {
        filterBtns.forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        currentFilter = btn.dataset.filter;
        render();
      });
    });

    // Limpiar filtros
    clearBtn.addEventListener('click', () => {
      filterBtns.forEach(b => b.classList.remove('active'));
      document.querySelector('.filter-btn[data-filter="all"]').classList.add('active');
      currentFilter = 'all';
      searchInput.value = '';
      render();
    });

    // Render inicial
    render();
  </script>
</body>
</html>
